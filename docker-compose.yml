version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dental_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dental_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dental_pass}
      POSTGRES_DB: ${POSTGRES_DB:-dental_db}
    ports:
      - "54323:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dental_user} -d ${POSTGRES_DB:-dental_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dental_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dental_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dental_user}:${POSTGRES_PASSWORD:-dental_pass}@postgres:5432/${POSTGRES_DB:-dental_db}
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  langfuse:
    image: ghcr.io/langfuse/langfuse:latest
    container_name: dental_langfuse
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dental_user}:${POSTGRES_PASSWORD:-dental_pass}@postgres:5432/langfuse_db
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme}
      SALT: ${LANGFUSE_SALT:-changeme}
    ports:
      - "3000:3000"
    profiles:
      - langfuse

volumes:
  postgres_data:
  redis_data:
